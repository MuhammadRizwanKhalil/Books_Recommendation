# ══════════════════════════════════════════════════════════════════════════════
# The Book Times — Host-level Nginx reverse proxy configuration
# ══════════════════════════════════════════════════════════════════════════════
#
# Copy this file to the server:
#   sudo cp deploy/nginx-host.conf /etc/nginx/sites-available/thebooktimes.com
#   sudo ln -s /etc/nginx/sites-available/thebooktimes.com /etc/nginx/sites-enabled/
#   sudo nginx -t
#   sudo systemctl reload nginx
#
# Then run Certbot to add SSL:
#   sudo certbot --nginx -d thebooktimes.com -d www.thebooktimes.com
#
# Certbot will automatically:
#   - Add SSL certificate paths
#   - Add HTTPS server block
#   - Add HTTP → HTTPS redirect
#   - Set up auto-renewal
#
# ══════════════════════════════════════════════════════════════════════════════

# Rate limiting zone (shared across all workers)
limit_req_zone $binary_remote_addr zone=thebooktimes_api:10m rate=30r/s;

server {
    listen 80;
    listen [::]:80;
    server_name thebooktimes.com www.thebooktimes.com;

    # Redirect www to non-www (after Certbot adds HTTPS, this becomes HTTPS redirect)
    if ($host = www.thebooktimes.com) {
        return 301 $scheme://thebooktimes.com$request_uri;
    }

    # Proxy everything to the Docker frontend container
    # The container's internal Nginx handles:
    #   - Serving the React SPA
    #   - Proxying /api/* to the backend container
    #   - Gzip, caching, security headers
    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;

        # Pass original client info
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (for dev, but doesn't hurt in prod)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Buffering
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
    }

    # Direct API rate limiting at the host level
    location /api/ {
        limit_req zone=thebooktimes_api burst=50 nodelay;

        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Longer timeout for API operations
        proxy_read_timeout 120s;

        # Larger body for file uploads
        client_max_body_size 10m;
    }

    # Block access to hidden files
    location ~ /\. {
        deny all;
        return 404;
    }
}
