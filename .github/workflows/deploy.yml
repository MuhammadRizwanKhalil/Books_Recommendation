name: Deploy to Production

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  # GHCR requires lowercase image names
  IMAGE_BASE: ghcr.io/muhammadrizwankhalil/books_recommendation

jobs:
  # ──────────────────────────────────────────────────────────────────────
  # Build images on the GitHub runner (7GB RAM, 4 CPUs) instead of the
  # tiny 1GB production VPS where `vite build` gets OOM-killed.
  # ──────────────────────────────────────────────────────────────────────
  build:
    name: Build & Push Images
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
      packages: write
    outputs:
      sha: ${{ steps.meta.outputs.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute tags
        id: meta
        run: |
          echo "sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push server image
        uses: docker/build-push-action@v6
        with:
          context: ./server
          target: production
          push: true
          tags: |
            ${{ env.IMAGE_BASE }}/server:latest
            ${{ env.IMAGE_BASE }}/server:${{ steps.meta.outputs.sha }}
          cache-from: type=registry,ref=${{ env.IMAGE_BASE }}/server:buildcache
          cache-to: type=registry,ref=${{ env.IMAGE_BASE }}/server:buildcache,mode=max

      - name: Build & push app image
        uses: docker/build-push-action@v6
        with:
          context: ./app
          target: production
          push: true
          build-args: |
            VITE_API_URL=/api
            BUILD_ID=${{ steps.meta.outputs.sha }}
          tags: |
            ${{ env.IMAGE_BASE }}/app:latest
            ${{ env.IMAGE_BASE }}/app:${{ steps.meta.outputs.sha }}
          cache-from: type=registry,ref=${{ env.IMAGE_BASE }}/app:buildcache
          cache-to: type=registry,ref=${{ env.IMAGE_BASE }}/app:buildcache,mode=max

  # ──────────────────────────────────────────────────────────────────────
  # Pull pre-built images on the production server and bring stack up.
  # No building happens on the VPS.
  # ──────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Server
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      packages: read
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        env:
          SHA: ${{ needs.build.outputs.sha }}
          GA_CREDENTIALS_JSON_B64: ${{ secrets.GA_CREDENTIALS_JSON_B64 }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: SHA,GA_CREDENTIALS_JSON_B64
          command_timeout: 8m
          script: |
            #!/bin/bash
            set -o pipefail

            DEPLOY_DIR=$(echo "${{ secrets.DEPLOY_PATH }}" | tr -d '[:space:]')
            COMPOSE_FILE="docker-compose.prod.yml"
            LOG_FILE="/tmp/deploy-$(date +%Y%m%d-%H%M%S).log"

            log()  { echo "[$(date +%H:%M:%S)] $1" | tee -a "$LOG_FILE"; }
            ok()   { echo "[$(date +%H:%M:%S)] ✅ $1" | tee -a "$LOG_FILE"; }
            warn() { echo "[$(date +%H:%M:%S)] ⚠️  $1" | tee -a "$LOG_FILE"; }
            fail() { echo "[$(date +%H:%M:%S)] ❌ $1" | tee -a "$LOG_FILE"; }

            log "═══ DEPLOY STARTED (sha=$SHA) ═══"

            if [ ! -d "$DEPLOY_DIR" ]; then fail "Deploy dir missing"; exit 1; fi
            cd "$DEPLOY_DIR"
            if [ ! -f ".env" ]; then fail ".env missing"; exit 1; fi
            if [ ! -f "$COMPOSE_FILE" ]; then fail "$COMPOSE_FILE missing"; exit 1; fi

            log "Disk: $(df -h / | tail -1 | awk '{print $5 " used, " $4 " free"}')"
            log "Memory: $(free -m | awk '/Mem:/{printf "%dMB used / %dMB total, %dMB available", $3, $2, $7}')"

            # ── Pull latest code (for compose file + .env structure) ──
            log "── Pulling code ──"
            git fetch origin master 2>&1 | tee -a "$LOG_FILE"
            git reset --hard origin/master 2>&1 | tee -a "$LOG_FILE"
            ok "Code at $(git rev-parse --short HEAD)"

            # ── Login to GHCR ──
            log "── Logging into GHCR ──"
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io \
              -u "${{ github.actor }}" --password-stdin 2>&1 | tee -a "$LOG_FILE"

            # ── Pin image tags to this commit so compose pulls exactly these ──
            export SERVER_IMAGE="ghcr.io/muhammadrizwankhalil/books_recommendation/server:${SHA}"
            export APP_IMAGE="ghcr.io/muhammadrizwankhalil/books_recommendation/app:${SHA}"
            log "SERVER_IMAGE=$SERVER_IMAGE"
            log "APP_IMAGE=$APP_IMAGE"

            # Persist for future restarts (e.g. after server reboot)
            grep -v '^SERVER_IMAGE=\|^APP_IMAGE=\|^GOOGLE_APPLICATION_CREDENTIALS_JSON=' .env > .env.tmp || true
            echo "SERVER_IMAGE=$SERVER_IMAGE" >> .env.tmp
            echo "APP_IMAGE=$APP_IMAGE"       >> .env.tmp

            # Inject GA credentials from GitHub secret (base64-encoded JSON).
            # This avoids storing credential files in git or on the runner.
            if [ -n "${GA_CREDENTIALS_JSON_B64:-}" ]; then
              echo "GOOGLE_APPLICATION_CREDENTIALS_JSON=$GA_CREDENTIALS_JSON_B64" >> .env.tmp
              log "GA credentials secret injected into .env"
            else
              warn "GA_CREDENTIALS_JSON_B64 secret missing; keeping existing GA credentials setting"
            fi

            mv .env.tmp .env

            # ── Pull images ──
            log "── Pulling images ──"
            if ! docker compose -f "$COMPOSE_FILE" pull server app 2>&1 | tee -a "$LOG_FILE"; then
              fail "Image pull failed"
              exit 1
            fi
            ok "Images pulled"

            # ── Start containers (force-recreate ensures fresh process) ──
            log "── Starting containers ──"
            if ! docker compose -f "$COMPOSE_FILE" up -d --force-recreate --remove-orphans 2>&1 | tee -a "$LOG_FILE"; then
              fail "docker compose up failed"
              docker compose -f "$COMPOSE_FILE" ps -a 2>&1 | tee -a "$LOG_FILE"
              docker compose -f "$COMPOSE_FILE" logs --tail=50 server 2>&1 | tee -a "$LOG_FILE" || true
              docker compose -f "$COMPOSE_FILE" logs --tail=20 app    2>&1 | tee -a "$LOG_FILE" || true
              exit 1
            fi

            # ── Health checks ──
            log "── Waiting for server health ──"
            for i in $(seq 1 18); do
              STATUS=$(docker inspect --format='{{.State.Health.Status}}' thebooktimes-server 2>/dev/null || echo "missing")
              if [ "$STATUS" = "healthy" ]; then ok "Server healthy after $((i*5))s"; break; fi
              STATE=$(docker inspect --format='{{.State.Status}}' thebooktimes-server 2>/dev/null || echo "unknown")
              if [ "$STATE" = "exited" ] || [ "$STATE" = "dead" ]; then
                fail "Server died ($STATE)"
                docker logs thebooktimes-server 2>&1 | tail -40 | tee -a "$LOG_FILE"
                exit 1
              fi
              log "  Server: $STATUS — waiting... ${i}/18"
              sleep 5
            done

            for i in $(seq 1 12); do
              STATUS=$(docker inspect --format='{{.State.Health.Status}}' thebooktimes-app 2>/dev/null || echo "missing")
              if [ "$STATUS" = "healthy" ]; then ok "App healthy after $((i*5))s"; break; fi
              log "  App: $STATUS — waiting... ${i}/12"
              sleep 5
            done

            # ── Verify endpoints ──
            API_STATUS=$(curl -sf --max-time 10 http://localhost:8080/api/health 2>/dev/null || true)
            if echo "$API_STATUS" | grep -q '"status":"ok"'; then ok "API healthy"; else warn "API: $API_STATUS"; fi

            FRONTEND_CODE=$(curl -sf --max-time 10 -o /dev/null -w '%{http_code}' http://localhost:8080/ 2>/dev/null || echo "ERR")
            if [ "$FRONTEND_CODE" = "200" ]; then ok "Frontend HTTP $FRONTEND_CODE"; else warn "Frontend HTTP $FRONTEND_CODE"; fi

            # ── Verify deployed image SHA matches what we just pushed ──
            DEPLOYED_APP=$(docker inspect thebooktimes-app --format '{{index .Config.Image}}' 2>/dev/null)
            if [ "$DEPLOYED_APP" = "$APP_IMAGE" ]; then
              ok "App image confirmed: $DEPLOYED_APP"
            else
              fail "App image mismatch! Expected $APP_IMAGE, got $DEPLOYED_APP"
              exit 1
            fi

            # ── Cleanup old images ──
            docker image prune -f 2>/dev/null | tail -1 || true

            log ""
            log "═══════════════════════════════════════════════"
            log "  DEPLOY COMPLETE — sha=$SHA"
            log "  Disk: $(df -h / | tail -1 | awk '{print $4 " free"}')"
            log "  Memory: $(free -m | awk '/Mem:/{printf "%dMB available", $7}')"
            log "═══════════════════════════════════════════════"
            docker compose -f "$COMPOSE_FILE" ps --format "table {{.Name}}\t{{.Status}}" 2>&1
