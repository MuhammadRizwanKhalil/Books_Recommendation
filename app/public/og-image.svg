<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="50%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c2631a"/>
      <stop offset="100%" style="stop-color:#d4841d"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="5" fill="url(#accent)"/>

  <!-- Decorative book shapes -->
  <rect x="70" y="80" width="50" height="70" rx="6" fill="rgba(194,99,26,0.12)" transform="rotate(-12 95 115)"/>
  <rect x="1050" y="100" width="45" height="65" rx="6" fill="rgba(194,99,26,0.1)" transform="rotate(15 1072 132)"/>
  <rect x="130" y="480" width="40" height="55" rx="5" fill="rgba(139,69,19,0.08)" transform="rotate(8 150 507)"/>
  <rect x="1080" y="460" width="48" height="68" rx="6" fill="rgba(194,99,26,0.08)" transform="rotate(-6 1104 494)"/>

  <!-- Open book icon -->
  <g transform="translate(280, 300)">
    <path d="M0 -100C-35 -110 -90 -106 -130 -95L-130 90C-90 80 -35 78 0 90Z" fill="rgba(255,255,255,0.92)" stroke="rgba(255,255,255,0.6)" stroke-width="2"/>
    <path d="M0 -100C35 -110 90 -106 130 -95L130 90C90 80 35 78 0 90Z" fill="rgba(255,255,255,0.82)" stroke="rgba(255,255,255,0.6)" stroke-width="2"/>
    <line x1="-105" y1="-48" x2="-20" y2="-42" stroke="#c2631a" stroke-width="3.5" stroke-opacity="0.3" stroke-linecap="round"/>
    <line x1="-105" y1="-12" x2="-20" y2="-6" stroke="#c2631a" stroke-width="3.5" stroke-opacity="0.3" stroke-linecap="round"/>
    <line x1="-105" y1="24" x2="-50" y2="28" stroke="#c2631a" stroke-width="3.5" stroke-opacity="0.2" stroke-linecap="round"/>
    <line x1="20" y1="-42" x2="105" y2="-48" stroke="#c2631a" stroke-width="3.5" stroke-opacity="0.3" stroke-linecap="round"/>
    <line x1="20" y1="-6" x2="105" y2="-12" stroke="#c2631a" stroke-width="3.5" stroke-opacity="0.3" stroke-linecap="round"/>
    <line x1="50" y1="28" x2="105" y2="24" stroke="#c2631a" stroke-width="3.5" stroke-opacity="0.2" stroke-linecap="round"/>
    <line x1="0" y1="-100" x2="0" y2="90" stroke="#c2631a" stroke-width="2.5" stroke-opacity="0.5"/>
  </g>

  <!-- Title -->
  <text x="500" y="230" font-family="Georgia, 'Times New Roman', serif" font-size="22" font-weight="400" fill="#c2631a" letter-spacing="6">THE</text>
  <text x="500" y="310" font-family="Georgia, 'Times New Roman', serif" font-size="72" font-weight="bold" fill="white">Book Times</text>

  <!-- Decorative rule -->
  <line x1="500" y1="335" x2="780" y2="335" stroke="#c2631a" stroke-width="2.5"/>

  <!-- Tagline -->
  <text x="500" y="380" font-family="system-ui, -apple-system, sans-serif" font-size="24" fill="rgba(255,255,255,0.75)">AI-Powered Book Recommendations</text>

  <!-- Features -->
  <text x="500" y="440" font-family="system-ui, sans-serif" font-size="18" fill="rgba(255,255,255,0.5)">&#x2726; 50,000+ Books  &#x2726; Personalized Picks  &#x2726; Expert Reviews</text>

  <!-- URL -->
  <text x="600" y="590" font-family="system-ui, sans-serif" font-size="18" fill="#c2631a" text-anchor="middle" letter-spacing="2">thebooktimes.com</text>

  <!-- Bottom accent bar -->
  <rect x="0" y="622" width="1200" height="8" fill="url(#accent)"/>
</svg>
