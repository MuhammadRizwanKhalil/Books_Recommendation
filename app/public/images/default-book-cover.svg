<svg xmlns="http://www.w3.org/2000/svg" width="600" height="900" viewBox="0 0 600 900" role="img" aria-labelledby="title desc">
  <title id="title">Default book cover</title>
  <desc id="desc">A branded fallback cover for books without artwork.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#101827"/>
      <stop offset="60%" stop-color="#172744"/>
      <stop offset="100%" stop-color="#22335a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#d97706"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="15%" r="70%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="600" height="900" rx="34" fill="url(#bg)"/>
  <rect width="600" height="8" fill="url(#accent)"/>
  <rect width="600" height="900" rx="34" fill="url(#glow)"/>

  <g transform="translate(300 350)">
    <path d="M0 -140C-54 -156 -134 -152 -204 -136V122C-134 106 -54 104 0 122Z" fill="#f8fafc" fill-opacity="0.92"/>
    <path d="M0 -140C54 -156 134 -152 204 -136V122C134 106 54 104 0 122Z" fill="#f1f5f9" fill-opacity="0.86"/>
    <path d="M0 -140V122" stroke="#f59e0b" stroke-opacity="0.45" stroke-width="4"/>

    <line x1="-166" y1="-66" x2="-36" y2="-56" stroke="#d97706" stroke-opacity="0.34" stroke-width="10" stroke-linecap="round"/>
    <line x1="-166" y1="-26" x2="-36" y2="-16" stroke="#d97706" stroke-opacity="0.34" stroke-width="10" stroke-linecap="round"/>
    <line x1="-166" y1="14" x2="-74" y2="24" stroke="#d97706" stroke-opacity="0.24" stroke-width="10" stroke-linecap="round"/>

    <line x1="36" y1="-56" x2="166" y2="-66" stroke="#d97706" stroke-opacity="0.34" stroke-width="10" stroke-linecap="round"/>
    <line x1="36" y1="-16" x2="166" y2="-26" stroke="#d97706" stroke-opacity="0.34" stroke-width="10" stroke-linecap="round"/>
    <line x1="74" y1="24" x2="166" y2="14" stroke="#d97706" stroke-opacity="0.24" stroke-width="10" stroke-linecap="round"/>
  </g>

  <text x="300" y="670" text-anchor="middle" font-family="Georgia,serif" font-size="44" font-weight="700" fill="#f8fafc" fill-opacity="0.92" letter-spacing="1.2">
    The Book Times
  </text>
  <text x="300" y="718" text-anchor="middle" font-family="Arial,sans-serif" font-size="22" fill="#f1f5f9" fill-opacity="0.75" letter-spacing="1.1">
    Story Worth Reading
  </text>

  <rect x="190" y="748" width="220" height="3" rx="2" fill="url(#accent)" opacity="0.75"/>
</svg>
