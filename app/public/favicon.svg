<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c2631a"/>
      <stop offset="100%" style="stop-color:#8B4513"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Open book icon (white) -->
  <g transform="translate(256, 220)">
    <!-- Left page -->
    <path d="M0 -110C-40 -122 -100 -118 -150 -105L-150 100C-100 88 -40 86 0 100Z"
          fill="rgba(255,255,255,0.95)" stroke="white" stroke-width="4" stroke-linejoin="round"/>
    <!-- Right page -->
    <path d="M0 -110C40 -122 100 -118 150 -105L150 100C100 88 40 86 0 100Z"
          fill="rgba(255,255,255,0.85)" stroke="white" stroke-width="4" stroke-linejoin="round"/>
    <!-- Page text lines - left -->
    <line x1="-120" y1="-55" x2="-25" y2="-48" stroke="#c2631a" stroke-width="5" stroke-opacity="0.35" stroke-linecap="round"/>
    <line x1="-120" y1="-15" x2="-25" y2="-8" stroke="#c2631a" stroke-width="5" stroke-opacity="0.35" stroke-linecap="round"/>
    <line x1="-120" y1="25" x2="-55" y2="30" stroke="#c2631a" stroke-width="5" stroke-opacity="0.25" stroke-linecap="round"/>
    <!-- Page text lines - right -->
    <line x1="25" y1="-48" x2="120" y2="-55" stroke="#c2631a" stroke-width="5" stroke-opacity="0.35" stroke-linecap="round"/>
    <line x1="25" y1="-8" x2="120" y2="-15" stroke="#c2631a" stroke-width="5" stroke-opacity="0.35" stroke-linecap="round"/>
    <line x1="55" y1="30" x2="120" y2="25" stroke="#c2631a" stroke-width="5" stroke-opacity="0.25" stroke-linecap="round"/>
  </g>
  <!-- "BT" initials -->
  <text x="256" y="430" font-family="Georgia, 'Times New Roman', serif" font-size="72" font-weight="bold" fill="rgba(255,255,255,0.9)" text-anchor="middle" letter-spacing="8">BT</text>
</svg>
