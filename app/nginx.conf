# The Book Times — Nginx config for production SPA with API proxy
# Supports both HTTP-only and HTTPS modes via SSL_ENABLED env

server_tokens off;

# ── HTTP → HTTPS redirect (when SSL is enabled) ─────────────────────────────
# Uncomment the block below when you have SSL certificates:
# server {
#     listen 80;
#     server_name your-domain.com www.your-domain.com;
#     return 301 https://$host$request_uri;
# }

server {
    listen 80;
    # Uncomment these lines when SSL certificates are available:
    # listen 443 ssl http2;
    # ssl_certificate /etc/nginx/ssl/fullchain.pem;
    # ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    # ssl_protocols TLSv1.2 TLSv1.3;
    # ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
    # ssl_prefer_server_ciphers on;
    # ssl_session_cache shared:SSL:10m;
    # ssl_session_timeout 1d;
    # ssl_stapling on;
    # ssl_stapling_verify on;

    server_name thebooktimes.com www.thebooktimes.com;
    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    # Uncomment when SSL is enabled:
    # add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # Enable gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff2;

    # Request size limit
    client_max_body_size 10m;

    # Cache static assets aggressively
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Nginx-level rate limiting for API
    # limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;

    # Proxy API requests to backend
    location /api/ {
        # limit_req zone=api burst=50 nodelay;
        proxy_pass http://server:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # Proxy SEO endpoints (sitemaps, robots.txt)
    location ~ ^/(sitemap.*\.xml|robots\.txt)$ {
        proxy_pass http://server:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_cache_bypass $http_upgrade;
    }

    # Proxy uploaded files
    location /uploads/ {
        proxy_pass http://server:3001;
        proxy_set_header Host $host;
        expires 30d;
        add_header Cache-Control "public";
    }

    # SPA fallback — serve index.html for all non-file routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log warn;
}
