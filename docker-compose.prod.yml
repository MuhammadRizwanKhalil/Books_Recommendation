# ══════════════════════════════════════════════════════════════════════════════
# The Book Times — Docker Compose for PRODUCTION
# ══════════════════════════════════════════════════════════════════════════════
#
# Usage:
#   docker compose -f docker-compose.prod.yml up --build -d
#   docker compose -f docker-compose.prod.yml down
#   docker compose -f docker-compose.prod.yml logs -f
#
# Architecture:
#   nginx (port 80/443) → reverse proxy → Express API (port 3001, internal)
#   nginx also serves the pre-built React SPA static files
#
# Before first run:
#   1. Copy .env.example → .env and fill in real secrets
#   2. Run: docker compose -f docker-compose.prod.yml up --build -d
#
# ══════════════════════════════════════════════════════════════════════════════

services:
  # ── MySQL Database ────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: thebooktimes-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-thebooktimes}
      MYSQL_USER: ${MYSQL_USER:-thebooktimes}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?MYSQL_PASSWORD is required}
    volumes:
      - mysql-data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── Backend API Server ───────────────────────────────────────────────────
  server:
    image: ${SERVER_IMAGE:-ghcr.io/muhammadrizwankhalil/books_recommendation/server:latest}
    build:
      context: ./server
      dockerfile: Dockerfile
      target: production
    container_name: thebooktimes-server
    restart: always
    expose:
      - "3001"
    environment:
      NODE_ENV: production
      PORT: "3001"
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
      MYSQL_USER: ${MYSQL_USER:-thebooktimes}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?MYSQL_PASSWORD is required}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-thebooktimes}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required in production}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@thebooktimes.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?ADMIN_PASSWORD is required in production}
      GOOGLE_BOOKS_API_KEY: ${GOOGLE_BOOKS_API_KEY:-}
      IMPORT_JOB_ENABLED: ${IMPORT_JOB_ENABLED:-true}
      IMPORT_CRON_SCHEDULE: ${IMPORT_CRON_SCHEDULE:-0 3 * * *}
      GA_MEASUREMENT_ID: ${GA_MEASUREMENT_ID:-}
      GA_PROPERTY_ID: ${GA_PROPERTY_ID:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      AI_BLOG_ENABLED: ${AI_BLOG_ENABLED:-false}
      AI_BLOG_CRON_SCHEDULE: ${AI_BLOG_CRON_SCHEDULE:-0 9 * * *}
      AI_BLOG_POSTS_PER_RUN: ${AI_BLOG_POSTS_PER_RUN:-1}
      AI_ENRICHMENT_ENABLED: ${AI_ENRICHMENT_ENABLED:-true}
      AI_ENRICHMENT_BATCH_SIZE: ${AI_ENRICHMENT_BATCH_SIZE:-100}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-The Book Times <noreply@thebooktimes.com>}
    volumes:
      - server-uploads:/app/data/uploads
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 128M
          cpus: "0.25"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── Frontend (nginx + static SPA) ───────────────────────────────────────
  app:
    image: ${APP_IMAGE:-ghcr.io/muhammadrizwankhalil/books_recommendation/app:latest}
    build:
      context: ./app
      dockerfile: Dockerfile
      target: production
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
        BUILD_ID: ${BUILD_ID:-dev}
    container_name: thebooktimes-app
    restart: always
    ports:
      - "127.0.0.1:${APP_PORT:-8080}:80"
    depends_on:
      server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.5"
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

volumes:
  mysql-data:
    name: thebooktimes-mysql
  server-uploads:
    name: thebooktimes-uploads
